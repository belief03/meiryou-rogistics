<body class="page-sub">
  <header class="site-header site-header--solid" id="siteHeader">
    <div class="site-header__inner">
      <a href="index-v2.html" class="site-header__logo" aria-label="株式会社名菱運輸">
        <img src="assets/logo-mru.png" alt="" class="site-header__logo-mark" width="52" height="52">
        <div class="site-header__logo-text">
          <span class="site-header__logo-name">名菱運輸</span>
          <span class="site-header__logo-sub">MEIRYOU LOGISTICS</span>

      <nav class="site-header__nav" id="nav" aria-label="メインナビゲーション">
        <ul class="site-header__nav-list">
          <li><a href="index-v2.html">TOP</a></li>

        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page-main tracking-page">
    <div class="page-header">
      <div class="container">
        <h2 class="page-title">配達状況の確認</h2>
        <p class="page-header__lead">お問い合わせ番号（伝票番号）を入力してください</p>
      </div>
    </div>

    <section class="content-section tracking-form-section">
      <div class="container container--narrow">
        <form class="tracking-form tracking-form--page" action="tracking-good.html" method="get" id="tracking-form">
          <label for="tracking-no" class="tracking-form__label">お問い合わせ番号（伝票番号）</label>
          <div class="tracking-form__row">
            <input type="text" id="tracking-no" name="no" class="tracking-form__input"
              placeholder="例：234567890（10桁）" maxlength="10" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
            <button type="submit" class="btn btn--primary tracking-form__submit">確認する</button>
          </div>
          <p class="tracking-form__note">※伝票に記載の番号をご入力ください。</p>
        </form>
      </div>
    </section>
  </main>
  <footer class="footer" style="padding: 1.2rem 0 0.85rem;">
    <div class="footer__accent" aria-hidden="true"></div>
    <div class="container">
