<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配達状況の確認 | 株式会社名菱運輸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-keyence-b">
  <header class="header">
    <div class="header-inner">
      <h1 class="logo"><a href="index.html" class="logo__link" aria-label="株式会社名菱運輸"><span class="logo__name">名菱運輸</span><span class="logo__sub" lang="en">meiryou logistics</span></a></h1>
      <nav class="nav" aria-hidden="true">
        <ul class="nav-list">
          <li><a href="index.html">TOPページ</a></li>
          <li><a href="service-good.html">実績</a></li>
          <li><a href="company-good.html">企業情報</a></li>
          <li><a href="news-good.html">お知らせ</a></li>
          <li><a href="contact-good.html">お問い合わせ</a></li>
        </ul>
      </nav>
      <button class="menu-btn" aria-label="メニュー" aria-expanded="false"></button>
    </div>
  </header>

  <main class="page-main tracking-page">
    <div class="page-header">
      <div class="container">
        <h2 class="page-title">配達状況の確認</h2>
        <p class="page-header__lead">お問い合わせ番号（伝票番号）を入力してください</p>
      </div>
    </div>

    <section class="content-section tracking-form-section">
      <div class="container container--narrow">
        <form class="tracking-form tracking-form--page" action="tracking-good.html" method="get" id="tracking-form">
          <label for="tracking-no" class="tracking-form__label">お問い合わせ番号（伝票番号）</label>
          <div class="tracking-form__row">
            <input type="text" id="tracking-no" name="no" class="tracking-form__input"
              placeholder="例：234567890（10桁）" maxlength="10" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
            <button type="submit" class="btn btn--primary tracking-form__submit">確認する</button>
          </div>
          <p class="tracking-form__note">※伝票に記載の番号をご入力ください。</p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-copy">© 2026 株式会社名菱運輸 All Rights Reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
